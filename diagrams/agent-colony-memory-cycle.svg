<text x="820.0" y="25.2" fill="#1e40af" font-size="28" text-anchor="middle">Colony Memory — The Reflection Cycle</text>
<text x="820.0" y="124.4" fill="#374151" font-size="16" text-anchor="middle">Events</text>
<text x="820.0" y="144.4" fill="#374151" font-size="16" text-anchor="middle">Colony events occur</text>
<text x="1190.0" y="274.4" fill="#ffffff" font-size="16" text-anchor="middle">Event Memory</text>
<text x="1190.0" y="294.4" fill="#ffffff" font-size="16" text-anchor="middle">What happened</text>
<text x="1190.0" y="314.4" fill="#ffffff" font-size="16" text-anchor="middle"></text>
<text x="1190.0" y="334.4" fill="#ffffff" font-size="16" text-anchor="middle">Chronicler Agent</text>
<text x="1110.0" y="514.4" fill="#374151" font-size="16" text-anchor="middle">Reflection</text>
<text x="1110.0" y="534.4" fill="#374151" font-size="16" text-anchor="middle">Pattern extraction</text>
<text x="820.0" y="674.4" fill="#ffffff" font-size="16" text-anchor="middle">Lesson Memory</text>
<text x="820.0" y="694.4" fill="#ffffff" font-size="16" text-anchor="middle">What we learned</text>
<text x="820.0" y="714.4" fill="#ffffff" font-size="16" text-anchor="middle"></text>
<text x="820.0" y="734.4" fill="#ffffff" font-size="16" text-anchor="middle">Reflector Agent</text>
<text x="960" y="670.4" fill="#64748b" font-size="16" text-anchor="start">Tagged with relevance conditions —</text>
<text x="960" y="690.4" fill="#64748b" font-size="16" text-anchor="start">surfaces when similar conditions arise,</text>
<text x="960" y="710.4" fill="#64748b" font-size="16" text-anchor="start">even decades later</text>
<text x="450.0" y="514.4" fill="#374151" font-size="16" text-anchor="middle">Promotion</text>
<text x="450.0" y="534.4" fill="#374151" font-size="16" text-anchor="middle">Recurring lessons graduate</text>
<text x="410.0" y="274.4" fill="#374151" font-size="16" text-anchor="middle">Constitutional Memory</text>
<text x="410.0" y="294.4" fill="#374151" font-size="16" text-anchor="middle">What we believe</text>
<text x="410.0" y="314.4" fill="#374151" font-size="16" text-anchor="middle"></text>
<text x="410.0" y="334.4" fill="#374151" font-size="16" text-anchor="middle">Constitutional Agent</text>
<text x="280" y="270.4" fill="#64748b" font-size="16" text-anchor="end">Standing rules that shape colony</text>
<text x="280" y="290.4" fill="#64748b" font-size="16" text-anchor="end">behaviour — can be challenged,</text>
<text x="280" y="310.4" fill="#64748b" font-size="16" text-anchor="end">reviewed, retired</text>
<text x="660.0" y="159.4" fill="#047857" font-size="16" text-anchor="middle">Rules shape how new events</text>
<text x="660.0" y="179.4" fill="#047857" font-size="16" text-anchor="middle">are interpreted and acted upon</text>
<text x="820.0" y="401.9" fill="#64748b" font-size="16" text-anchor="middle">The colony learns — experience becomes lessons,</text>
<text x="820.0" y="421.9" fill="#64748b" font-size="16" text-anchor="middle">lessons become rules, rules become the</text>
<text x="820.0" y="441.9" fill="#64748b" font-size="16" text-anchor="middle">colony's operating constitution</text>
</svg>
