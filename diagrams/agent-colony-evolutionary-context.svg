<text x="610.0" y="25.2" fill="#1e40af" font-size="28" text-anchor="middle">The Evolutionary Context</text>
<text x="610.0" y="54.4" fill="#64748b" font-size="16" text-anchor="middle">Each shift changed the unit, the composition, and the governance</text>
<text x="250.0" y="154.4" fill="#3b82f6" font-size="16" text-anchor="middle">+Reuse</text>
<text x="550.0" y="134.4" fill="#3b82f6" font-size="16" text-anchor="middle">+Independent deployment</text>
<text x="880.0" y="94.4" fill="#6d28d9" font-size="16" text-anchor="middle">+Autonomy</text>
<text x="880.0" y="114.4" fill="#6d28d9" font-size="16" text-anchor="middle">+Self-evolution</text>
<text x="880.0" y="134.4" fill="#6d28d9" font-size="16" text-anchor="middle">+Lifecycle identity</text>
<text x="100.0" y="224.95" fill="#374151" font-size="18" text-anchor="middle">Monoliths</text>
<text x="100.0" y="314.4" fill="#64748b" font-size="16" text-anchor="middle">Unit: Application</text>
<text x="100.0" y="334.4" fill="#64748b" font-size="16" text-anchor="middle">Composition: Internal calls</text>
<text x="100.0" y="354.4" fill="#64748b" font-size="16" text-anchor="middle">Governance: Single team</text>
<text x="400.0" y="224.95" fill="#374151" font-size="18" text-anchor="middle">SOA</text>
<text x="400.0" y="314.4" fill="#64748b" font-size="16" text-anchor="middle">Unit: Service</text>
<text x="400.0" y="334.4" fill="#64748b" font-size="16" text-anchor="middle">Composition: WSDL/ESB</text>
<text x="400.0" y="354.4" fill="#64748b" font-size="16" text-anchor="middle">Governance: Service registry</text>
<text x="700.0" y="224.95" fill="#ffffff" font-size="18" text-anchor="middle">Microservices</text>
<text x="700.0" y="314.4" fill="#64748b" font-size="16" text-anchor="middle">Unit: Microservice</text>
<text x="700.0" y="334.4" fill="#64748b" font-size="16" text-anchor="middle">Composition: HTTP/gRPC/events</text>
<text x="700.0" y="354.4" fill="#64748b" font-size="16" text-anchor="middle">Governance: API gateway</text>
<text x="1040.0" y="225.5" fill="#374151" font-size="20" text-anchor="middle">Agent Colonies</text>
<text x="1040.0" y="354.4" fill="#6d28d9" font-size="16" text-anchor="middle">Unit: Agent</text>
<text x="1040.0" y="374.4" fill="#6d28d9" font-size="16" text-anchor="middle">Composition: Open protocol</text>
<text x="1040.0" y="394.4" fill="#6d28d9" font-size="16" text-anchor="middle">Governance: Self-governing</text>
<text x="1040.0" y="414.4" fill="#6d28d9" font-size="16" text-anchor="middle">with human boundaries</text>
</svg>
