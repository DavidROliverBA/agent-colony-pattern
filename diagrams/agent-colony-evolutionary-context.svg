    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
  </marker>
</defs>
<rect x="0" y="160" width="200" height="120" rx="8" ry="8" fill="#93c5fd" stroke="#1e3a5f" stroke-width="2"/>
