<text x="0" y="28.8" fill="#1e40af" font-size="32" text-anchor="start">Colony Architecture — Four Layers</text>
<text x="450.0" y="113.7" fill="#1e3a5f" font-size="18" text-anchor="middle">Human World</text>
<text x="450.0" y="136.2" fill="#1e3a5f" font-size="18" text-anchor="middle">Organisations, people, physical systems, legal obligations</text>
<text x="450.0" y="214.4" fill="#dc2626" font-size="16" text-anchor="middle">Coexistence Boundary — checkpoints, playbooks, mutual trust</text>
<text x="20" y="306.0" fill="#ffffff" font-size="20" text-anchor="start">L1: Colony Governance</text>
<text x="160.0" y="363.9" fill="#1e3a5f" font-size="16" text-anchor="middle">Registry Agent</text>
<text x="440.0" y="363.9" fill="#1e3a5f" font-size="16" text-anchor="middle">Equilibrium Agent</text>
<text x="720.0" y="363.9" fill="#1e3a5f" font-size="16" text-anchor="middle">Lifecycle Agent</text>
<text x="160.0" y="453.9" fill="#1e3a5f" font-size="16" text-anchor="middle">Chronicler Agent</text>
<text x="440.0" y="453.9" fill="#1e3a5f" font-size="16" text-anchor="middle">Reflector Agent</text>
<text x="720.0" y="453.9" fill="#1e3a5f" font-size="16" text-anchor="middle">Constitutional Agent</text>
<text x="20" y="566.0" fill="#dc2626" font-size="20" text-anchor="start">L2: Colony Immune System</text>
<text x="160.0" y="623.9" fill="#dc2626" font-size="16" text-anchor="middle">Sentinel Agent</text>
<text x="440.0" y="623.9" fill="#dc2626" font-size="16" text-anchor="middle">Response Coordinator</text>
<text x="720.0" y="623.9" fill="#dc2626" font-size="16" text-anchor="middle">Patch Agent</text>
<text x="20" y="746.0" fill="#047857" font-size="20" text-anchor="start">L3: Agent Mesh</text>
<text x="90.0" y="823.9" fill="#047857" font-size="16" text-anchor="middle">Domain</text>
<text x="205.0" y="838.9" fill="#047857" font-size="16" text-anchor="middle">Spec.</text>
<text x="330.0" y="823.9" fill="#047857" font-size="16" text-anchor="middle">Domain</text>
<text x="520.0" y="823.9" fill="#047857" font-size="16" text-anchor="middle">Gen.</text>
<text x="630.0" y="823.9" fill="#047857" font-size="16" text-anchor="middle">Spec.</text>
<text x="750.0" y="823.9" fill="#047857" font-size="16" text-anchor="middle">Domain</text>
<text x="860" y="804.4" fill="#047857" font-size="16" text-anchor="start">...</text>
<text x="40" y="894.4" fill="#047857" font-size="16" text-anchor="start">Unbounded — grows and contracts as the colony evolves</text>
<text x="450.0" y="974.4" fill="#1e40af" font-size="16" text-anchor="middle">L4: Substrate</text>
<text x="450.0" y="994.4" fill="#1e40af" font-size="16" text-anchor="middle">Compute, Storage, Network, AI Models — any provider, replaceable by design</text>
<text x="960" y="494.4" fill="#64748b" font-size="16" text-anchor="start">No layer knows the</text>
<text x="960" y="514.4" fill="#64748b" font-size="16" text-anchor="start">implementation details</text>
<text x="960" y="534.4" fill="#64748b" font-size="16" text-anchor="start">of the layer below.</text>
