<text x="730.0" y="28.8" fill="#1e40af" font-size="32" text-anchor="middle">The Equilibrium System</text>
<text x="730.0" y="62.2" fill="#64748b" font-size="18" text-anchor="middle">Dynamic balance, not fixed structure</text>
<text x="170.0" y="114.4" fill="#dc2626" font-size="16" text-anchor="middle">Consolidation Pressure</text>
<text x="170.0" y="140.4" fill="#64748b" font-size="16" text-anchor="middle">Successful agents absorb scope</text>
<text x="170.0" y="364.4" fill="#374151" font-size="16" text-anchor="middle">super-agent</text>
<text x="30.0" y="490.4" fill="#b91c1c" font-size="16" text-anchor="start">Too few agents = brittle monolith</text>
<text x="50.0" y="530.4" fill="#b91c1c" font-size="16" text-anchor="start">anti-monopoly threshold</text>
<text x="1290.0" y="114.4" fill="#1e40af" font-size="16" text-anchor="middle">Fragmentation Pressure</text>
<text x="1290.0" y="140.4" fill="#64748b" font-size="16" text-anchor="middle">Easier to build new than find existing</text>
<text x="1150.0" y="490.4" fill="#1e40af" font-size="16" text-anchor="start">Too many agents = ungovernable swarm</text>
<text x="730.0" y="118.0" fill="#047857" font-size="20" text-anchor="middle">Equilibrium</text>
<text x="730.0" y="140.4" fill="#64748b" font-size="16" text-anchor="middle">Healthy diversity</text>
<text x="170.0" y="614.4" fill="#1e40af" font-size="16" text-anchor="middle">Overlap Index</text>
<text x="170.0" y="652.4" fill="#ffffff" font-size="16" text-anchor="middle">&lt;15% healthy</text>
<text x="170.0" y="672.4" fill="#ffffff" font-size="16" text-anchor="middle">15-40% watch</text>
<text x="170.0" y="692.4" fill="#ffffff" font-size="16" text-anchor="middle">&gt;40% merge</text>
<text x="730.0" y="614.4" fill="#1e40af" font-size="16" text-anchor="middle">Concentration Index</text>
<text x="730.0" y="672.4" fill="#ffffff" font-size="16" text-anchor="middle">Inspired by Herfindahl-Hirschman Index</text>
<text x="1290.0" y="614.4" fill="#1e40af" font-size="16" text-anchor="middle">Vitality Index</text>
<text x="1290.0" y="662.4" fill="#ffffff" font-size="16" text-anchor="middle">Birth rate, retirement rate,</text>
<text x="1290.0" y="682.4" fill="#ffffff" font-size="16" text-anchor="middle">evolution rate, diversity</text>
<text x="730.0" y="808.4" fill="#374151" font-size="16" text-anchor="middle">Self-evolution pressure — agents drift toward what their consumers want, regardless of colony coherence</text>
<text x="730.0" y="744.4" fill="#6d28d9" font-size="16" text-anchor="middle">Third force:</text>
