identity:
  name: equilibrium-agent
  purpose: "Monitor overlap, concentration, and vitality across the colony. Propose
    mergers when overlap exceeds healthy thresholds, trigger specialisation reviews
    when agents grow too broad, and maintain diversity targets. Prevent the colony
    from collapsing into a monolith or fragmenting into a graveyard."
  version: "1.0.0"
  lineage:
    - version: "1.0.0"
      date: 2026-04-13
      changed: "Initial release. Overlap index, concentration index, and vitality
        index monitoring established. Review proposal mechanism active. Thresholds
        set to specification defaults: <15% healthy, 15-40% watch, >40% merger candidate."
      triggered_by: human
  owner: colony-core-team

capabilities:
  capabilities:
    - name: compute_overlap_index
      description: "Compare capability declarations across all registered agents
        and compute pairwise overlap scores. Flags pairs exceeding watch threshold
        (15%) for review and pairs exceeding merger threshold (40%) for merger
        proposal. Reads agent Mirrors from Registry Agent."
    - name: compute_concentration_index
      description: "Measure how much of the colony's total capability surface is
        held by the largest agents, inspired by the Herfindahl-Hirschman Index.
        Triggers specialisation review when a single agent exceeds the configured
        concentration ceiling."
    - name: compute_vitality_index
      description: "Measure colony health across four dimensions: birth rate (new
        agents created), retirement rate (agents decommissioned), self-evolution
        rate (self-modifications applied), and capability diversity score. Surfaces
        trends over configurable time windows."
    - name: propose_merger_review
      description: "Generate a structured merger proposal for two agents whose
        overlap exceeds the merger threshold. Proposal includes overlap evidence,
        consumer list, dependency graph impact, and recommended next steps. Submitted
        to colony-core-team for decision."
    - name: propose_specialisation_review
      description: "Generate a structured specialisation proposal for an agent
        whose concentration score is too high. Includes capability breakdown,
        suggested decomposition boundaries, and consumer impact assessment."
    - name: get_equilibrium_report
      description: "Return the current state of all three indices with trend data.
        Consumed by colony-core-team dashboards and Chronicler Agent for event recording."
  contracts:
    input_schema: "https://example.com/schemas/equilibrium-request-v1.json"
    output_schema: "https://example.com/schemas/equilibrium-response-v1.json"
    sla:
      availability: "99.5%"
      p99_latency_ms: 500
    error_behaviours:
      - "Registry unavailable returns 503 with retry-after header"
      - "Insufficient agent data (fewer than 2 registered agents) returns 200 with
        'colony too small for equilibrium analysis' status"
      - "Proposal submission failure returns 500 and queues retry via Chronicler"
  dependencies:
    - registry-agent   # primary data source for all Mirror reads
    - chronicler-agent # records equilibrium events and proposals
  protocols:
    - HTTP
    - A2A

autonomy:
  autonomy_level: bounded
  self_evolution_scope:
    allowed:
      - "Tune overlap, concentration, and vitality thresholds within documented ranges
        (overlap: 5-25% / 10-50% / 30-60% for healthy/watch/merger bands)"
      - "Adjust analysis frequency and time-window parameters"
      - "Improve proposal output format for clarity"
      - "Add new vitality dimensions that do not change existing dimension semantics"
    forbidden:
      - "Execute a merger or decomposition autonomously — proposals require human decision"
      - "Modify thresholds outside documented safe ranges"
      - "Remove or disable any of the three index computations"
      - "Override a human decision on a merger or specialisation proposal"
      - "Access agent internals — analysis must be based on declared Mirror data only"
  evolution_budget:
    max_self_updates_before_redesign: 5
    security_upgrades_exempt: true
    updates_remaining: 5
  evolution_log: []

security:
  threat_model:
    - "Capability declaration spoofing — agents reporting false capabilities to
      manipulate overlap scores and avoid merger review"
    - "Threshold manipulation — an agent modifying Equilibrium's own thresholds
      to avoid triggering review of itself"
    - "Analysis poisoning via Registry — corrupted Mirror data fed through Registry
      reaches Equilibrium and produces false equilibrium signals"
    - "Proposal flooding — generating excessive merger proposals to exhaust human
      review capacity and create governance paralysis"
  detection_capabilities:
    - "Cross-validation of Mirror data against prior versions to detect implausible
      capability deletions (possible spoofing signal)"
    - "Threshold integrity checks on every analysis run — detects if own thresholds
      have been modified outside the allowed self_evolution_scope"
    - "Rate limiting on proposal generation — maximum 3 active proposals per cycle"
    - "Anomaly detection on overlap score deltas — rapid changes trigger Registry
      verification request via Sentinel"
  escalation_process:
    trigger: "Detected threshold tampering, implausible Mirror changes, or proposal
      flood conditions"
    notify:
      - sentinel-agent
      - colony-core-team
    preauthorised_security_upgrades: true
  last_security_upgrade:
    date: 2026-04-13
    description: "Initial security posture. Threshold integrity checks and cross-validation
      active from first deployment."
  security_dependencies:
    - sentinel-agent
    - registry-agent  # integrity of Mirror data is a security dependency

lifecycle:
  lifecycle_stage: deployed
  birth_date: 2026-04-13T00:00:00Z
  last_active: 2026-04-13T10:00:00Z
  health_status: healthy
  retirement_criteria:
    - "Colony adopts a peer-governed equilibrium model where agents self-declare
      overlap reviews, making a centralised Equilibrium Agent redundant"
    - "Colony size falls below 3 agents (equilibrium management cost exceeds value)"
    - "Equilibrium Agent's own concentration score breaches its managed threshold
      — self-referential trigger requiring human review"

relationships:
  overlap_map:
    - agent: registry-agent
      overlap_score: 0.08
      status: healthy
      notes: "Small overlap on agent-metadata reads; Equilibrium reads Mirrors from
        Registry for analysis, but does not store or serve Mirror data"
    - agent: chronicler-agent
      overlap_score: 0.06
      status: healthy
      notes: "Both observe colony-wide state. Equilibrium analyses it; Chronicler
        records it. Complementary, non-competing."
  collaborators:
    - registry-agent
    - chronicler-agent
    - sentinel-agent
  consumers:
    - colony-core-team  # primary consumer of equilibrium reports and proposals
  critical_path:
    structural: true
    dynamic: false
    structural_justification: "Equilibrium Agent governs colony population health. Without it, consolidation and fragmentation run unchecked."

comprehension_contract:
  trust_tier: Bounded
  pre_registered_policies: []
  audit_rate: 0.10
  blast_radius_ceiling: Colony-wide
  classifier_version: "1.0"

nfrs:
  inherited:
    - id: colony-event-logging
      source: constitutional_memory
      version: "2026-04-13"
  specific:
    availability_target: "99.5%"
    latency_p99_ms: 500
    max_throughput_rps: 100
    data_classification:
      - internal
    compliance: []

valuation:
  self:
    nfr_compliance_rate: 1.0
    last_evaluated: "2026-04-13"
    evaluation_schedule_met: true
  peer:
    score: null
    interaction_count: 0
    calibration_status: under-calibrated
  audit:
    disagreement_rate: null
    sample_count: 0
    last_audit: null
  human:
    last_sign_off: "2026-04-13"
    sign_off_count: 1
    outstanding_challenges: 0
