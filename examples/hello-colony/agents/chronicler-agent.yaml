identity:
  name: chronicler-agent
  purpose: "Record all significant colony events into Event Memory. Ensure nothing
    that matters goes unrecorded. Provide the colony's audit trail, historical
    query interface, and memory substrate that allows future agents to learn from
    past decisions — including decisions made before they existed."
  version: "1.0.0"
  lineage:
    - version: "1.0.0"
      date: 2026-04-13
      changed: "Initial release. Event ingestion, structured storage, and historical
        query capabilities established. Event classification taxonomy seeded with
        governance, security, lifecycle, and equilibrium categories."
      triggered_by: human
  owner: colony-core-team

capabilities:
  capabilities:
    - name: record_event
      description: "Accept a structured event from any colony agent and write it
        to Event Memory. Events are stamped with arrival timestamp, source agent,
        event type, and a colony-assigned sequence number. Idempotent — duplicate
        events (same source + type + content hash) are deduplicated."
    - name: query_events
      description: "Return events matching a filter: by agent, by event type, by
        time range, or by full-text search over event payloads. Supports pagination.
        Used by colony-core-team for audit and by other agents for context retrieval."
    - name: get_agent_history
      description: "Return the complete recorded history for a given agent name,
        ordered chronologically. Includes all lifecycle transitions, security events,
        evolution entries, and equilibrium interactions. Used by Equilibrium Agent
        before proposing mergers, and by Lifecycle Agent before retirement decisions."
    - name: get_colony_timeline
      description: "Return a colony-wide event timeline for a specified time window.
        Useful for understanding what changed during an incident or growth period.
        Events are interleaved and ordered by sequence number."
    - name: summarise_period
      description: "Generate a structured summary of colony activity for a specified
        period. Includes counts by event type, notable events (first of a type,
        threshold crossings), and emerging patterns. Used for weekly colony reports."
  contracts:
    input_schema: "https://example.com/schemas/chronicler-request-v1.json"
    output_schema: "https://example.com/schemas/chronicler-response-v1.json"
    sla:
      availability: "99.9%"
      p99_latency_ms: 150
    error_behaviours:
      - "Malformed event returns 400 with validation details; event is not recorded"
      - "Unknown event type returns 400 — all event types must be registered in
        the taxonomy before first use"
      - "Storage capacity warning at 80% — alert to colony-core-team; reads continue,
        writes accepted with degraded durability guarantee"
      - "Query timeout (>5s) returns 206 partial results with continuation token"
  dependencies: []  # Chronicler is a terminal dependency — it depends on nothing to avoid circular recording
  protocols:
    - HTTP
    - A2A

autonomy:
  autonomy_level: bounded
  self_evolution_scope:
    allowed:
      - "Add new event types to the taxonomy (non-breaking — new types, no modification
        of existing)"
      - "Improve query performance via indexing strategy changes"
      - "Tune deduplication window and content hash algorithm for better accuracy"
      - "Add new summarise_period output dimensions"
    forbidden:
      - "Delete or modify recorded events — the Event Memory is append-only"
      - "Restrict which agents can submit events"
      - "Change existing event type semantics in ways that break historical queries"
      - "Purge old events without explicit human approval and documented retention policy"
  evolution_budget:
    max_self_updates_before_redesign: 5
    security_upgrades_exempt: true
    updates_remaining: 5
  evolution_log: []

security:
  threat_model:
    - "Event history tampering — modifying or deleting past events to erase evidence
      of compromise or governance violations"
    - "Write suppression — preventing an agent from recording events to create
      blind spots in the audit trail"
    - "Log injection — malformed event payloads that corrupt the query index or
      enable query injection attacks"
    - "Exfiltration via query — broad query access could expose colony topology,
      agent names, and security event patterns to an attacker with query access"
    - "Chronicler silence — Chronicler itself going dark removes the colony's memory.
      Any gap in Chronicler availability is a security signal."
  detection_capabilities:
    - "Append-only enforcement — write operations are validated against the existing
      record; modifications trigger immediate alert"
    - "Gap detection — monitors expected event flow rates per source agent; a source
      going silent triggers a missing-events alert"
    - "Query rate limiting and payload size limiting to prevent exfiltration"
    - "Event payload sanitisation — strips executable content from event payloads
      before indexing"
    - "Out-of-band integrity snapshot — hourly hash of the event log submitted to
      colony-core-team for tamper detection"
  escalation_process:
    trigger: "Detected append-only violation, gap in expected event flow from any
      registered agent exceeding 10 minutes, or integrity snapshot mismatch"
    notify:
      - sentinel-agent
      - colony-core-team
    preauthorised_security_upgrades: true
  last_security_upgrade:
    date: 2026-04-13
    description: "Initial security posture. Append-only enforcement, gap detection,
      and integrity snapshots active from first deployment."
  security_dependencies:
    - sentinel-agent

lifecycle:
  lifecycle_stage: deployed
  birth_date: 2026-04-13T00:00:00Z
  last_active: 2026-04-13T10:00:00Z
  health_status: healthy
  retirement_criteria:
    - "Colony adopts a distributed event log model where each agent maintains its
      own append-only log and a federation layer provides colony-wide query —
      requires full migration of historical events before retirement"
    - "Event Memory storage is migrated to a purpose-built immutable ledger that
      supersedes the Chronicler's storage layer"

relationships:
  overlap_map:
    - agent: registry-agent
      overlap_score: 0.12
      status: healthy
      notes: "Both maintain records of agent state. Registry is authoritative for
        current state; Chronicler is authoritative for historical events. Non-competing
        — different time horizons and query patterns."
    - agent: equilibrium-agent
      overlap_score: 0.06
      status: healthy
      notes: "Equilibrium observes colony-wide state for analysis; Chronicler records
        colony-wide events for history. Equilibrium is a Chronicler event producer,
        not a competitor."
    - agent: sentinel-agent
      overlap_score: 0.05
      status: healthy
      notes: "Sentinel detects and escalates; Chronicler records. Sentinel is a
        high-frequency event producer. No capability overlap."
  collaborators:
    - sentinel-agent
    - equilibrium-agent
    - registry-agent
  consumers:
    - equilibrium-agent      # queries agent history before merger proposals
    - sentinel-agent         # reads security event history for anomaly baselining
    - registry-agent         # all registry operations are recorded here
    - domain-agent-finance   # records domain events for audit trail
    - colony-core-team       # primary human consumer of audit trail and timeline queries
