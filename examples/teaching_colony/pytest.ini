[pytest]
# Teaching Colony test configuration
#
# Markers:
#   live: tests that actually call the Anthropic API. Require
#         ANTHROPIC_API_KEY and cost real tokens. Run with:
#            pytest -m live
#         By default (no -m flag) these tests are collected and run too,
#         but individual tests skip themselves if the API key is missing.
#         To run ONLY mock-mode tests, use:
#            pytest -m "not live"

markers =
    live: tests that call the real Anthropic API (require ANTHROPIC_API_KEY)
